name: Music Vault portable release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing annotated application tag to publish
        required: true
        default: v1.0.0
        type: choice
        options:
          - v1.0.0

permissions:
  contents: read

concurrency:
  group: music-vault-release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-verify:
    runs-on: windows-latest
    timeout-minutes: 90
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      source_tag: ${{ steps.meta.outputs.source_tag }}
      source_tag_object: ${{ steps.meta.outputs.source_tag_object }}
      source_commit: ${{ steps.meta.outputs.source_commit }}
      source_tree_hash: ${{ steps.meta.outputs.source_tree_hash }}
      release_tooling_commit: ${{ steps.meta.outputs.release_tooling_commit }}
      release_tooling_tree_hash: ${{ steps.meta.outputs.release_tooling_tree_hash }}
      release_version: ${{ steps.meta.outputs.release_version }}
      portable_filename: ${{ steps.meta.outputs.portable_filename }}
      compliance_filename: ${{ steps.meta.outputs.compliance_filename }}
    steps:
      - name: Check out exact current-main release tooling
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          path: tooling
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Check out immutable tagged application
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          path: application
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up audited Python 3.11.9
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.9"
          cache: pip
          cache-dependency-path: application/requirements-release.txt

      - name: Validate immutable application and tooling provenance
        id: meta
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ('${{ github.event_name }}' -eq 'workflow_dispatch' -and '${{ github.ref }}' -ne 'refs/heads/main') {
            throw 'Corrective releases must be dispatched from main.'
          }
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ inputs.release_tag }}' } else { '${{ github.ref_name }}' }
          $expected = python -B -c "import sys; sys.path.insert(0, 'application'); from music_vault.version import APP_VERSION; print('v' + APP_VERSION)"
          if ($tag -ne $expected.Trim()) { throw 'Tag does not match the tagged application version.' }
          $tagRef = "refs/tags/$tag"
          if ((git -C application cat-file -t $tagRef).Trim() -ne 'tag') { throw 'Release tag must be annotated.' }
          $tagObject = (git -C application rev-parse $tagRef).Trim()
          $sourceCommit = (git -C application rev-parse "$tagRef^{commit}").Trim()
          $sourceTree = (git -C application rev-parse "$sourceCommit^{tree}").Trim()
          if ($tag -eq 'v1.0.0') {
            if ($tagObject -ne 'fc47cb2a3ad9e084d382739b9bc4d2e7cf771437') { throw 'The immutable v1.0.0 tag object changed.' }
            if ($sourceCommit -ne 'af00394fa1e6c5c0f18c7db70d2aaf6a26e84a6b') { throw 'The immutable v1.0.0 application commit changed.' }
          }
          $toolingCommit = (git -C tooling rev-parse HEAD).Trim()
          $toolingTree = (git -C tooling rev-parse "$toolingCommit^{tree}").Trim()
          if ((git -C application rev-parse HEAD).Trim() -ne $sourceCommit) { throw 'Application checkout is not the tagged commit.' }
          if ($toolingCommit -ne '${{ github.sha }}') { throw 'Tooling checkout is not the workflow commit.' }
          if (git -C application status --porcelain=v1 --untracked-files=all) { throw 'Tagged application checkout is dirty.' }
          if (git -C tooling status --porcelain=v1 --untracked-files=all) { throw 'Release tooling checkout is dirty.' }
          $version = $tag.Substring(1)
          "artifact_name=music-vault-$tag-verified-release" >> $env:GITHUB_OUTPUT
          "release_version=$version" >> $env:GITHUB_OUTPUT
          "portable_filename=MusicVault-v$version-Windows-x64-Portable.zip" >> $env:GITHUB_OUTPUT
          "compliance_filename=MusicVault-v$version-Source-Compliance.zip" >> $env:GITHUB_OUTPUT
          "source_tag=$tag" >> $env:GITHUB_OUTPUT
          "source_tag_object=$tagObject" >> $env:GITHUB_OUTPUT
          "source_commit=$sourceCommit" >> $env:GITHUB_OUTPUT
          "source_tree_hash=$sourceTree" >> $env:GITHUB_OUTPUT
          "release_tooling_commit=$toolingCommit" >> $env:GITHUB_OUTPUT
          "release_tooling_tree_hash=$toolingTree" >> $env:GITHUB_OUTPUT

      - name: Install exact tagged release environment
        shell: pwsh
        run: python -m pip install --disable-pip-version-check -r application/requirements-release.txt

      - name: Test corrected release tooling
        shell: pwsh
        working-directory: tooling
        run: |
          $batchTests = @(Get-ChildItem -LiteralPath tests -Filter 'test_batch8_1_*.py' | ForEach-Object FullName)
          python -B -m pytest -q tests/test_release_pipeline.py @batchTests
          if ($LASTEXITCODE -ne 0) { throw 'Corrected release-tool tests failed.' }

      - name: Scan complete current publication history
        shell: pwsh
        run: python -B tooling/tools/security/pre_public_history_check.py --repo tooling

      - name: Verify tagged application source and imports
        shell: pwsh
        working-directory: application
        run: python -B tools/verify_music_vault.py

      - name: Run tagged application regression suite once
        shell: pwsh
        working-directory: application
        run: python -B -m pytest -q

      - name: Scan tagged publication candidate
        shell: pwsh
        working-directory: application
        run: python -B tools/security/pre_public_commit_check.py

      - name: Compile tagged active Python
        shell: pwsh
        working-directory: application
        run: python -B -m compileall -q music_vault tests tools

      - name: Build tagged official one-folder EXE
        shell: pwsh
        working-directory: application
        run: python -m PyInstaller --noconfirm --clean MusicVault.spec

      - name: Fetch corrected hash-pinned corresponding source
        shell: pwsh
        run: >-
          python -B tooling/tools/release/fetch_compliance_sources.py
          --cache-dir tooling/release_artifacts/.source-cache
          --inventory-path tooling/tools/release/third_party_licenses.json

      - name: Build tagged portable with current release tooling
        shell: pwsh
        run: >-
          python -B tooling/tools/release/build_portable_release.py
          --application-root application
          --dist-dir application/dist/MusicVault
          --output-dir release_artifacts
          --source-tag "${{ steps.meta.outputs.source_tag }}"
          --source-commit "${{ steps.meta.outputs.source_commit }}"
          --release-tooling-commit "${{ steps.meta.outputs.release_tooling_commit }}"
          --license-inventory tooling/tools/release/third_party_licenses.json
          --source-cache tooling/release_artifacts/.source-cache
          --require-clean-source

      - name: Verify release and seal transfer payload
        shell: pwsh
        run: |
          python -B tooling/tools/release/verify_portable_release.py "release_artifacts/${{ steps.meta.outputs.portable_filename }}"
          if ($LASTEXITCODE -ne 0) { throw 'Portable/compliance verification failed.' }
          python -B tooling/tools/release/validate_release_payload.py write release_artifacts --expected-source-tag "${{ steps.meta.outputs.source_tag }}" --expected-source-commit "${{ steps.meta.outputs.source_commit }}" --expected-tooling-commit "${{ steps.meta.outputs.release_tooling_commit }}"
          if ($LASTEXITCODE -ne 0) { throw 'Release transfer sealing failed.' }
          python -B tooling/tools/release/validate_release_payload.py verify release_artifacts --expected-source-tag "${{ steps.meta.outputs.source_tag }}" --expected-source-commit "${{ steps.meta.outputs.source_commit }}" --expected-tooling-commit "${{ steps.meta.outputs.release_tooling_commit }}"
          if ($LASTEXITCODE -ne 0) { throw 'Release transfer verification failed.' }

      - name: Retain exact verified release payload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            release_artifacts/${{ steps.meta.outputs.portable_filename }}
            release_artifacts/${{ steps.meta.outputs.portable_filename }}.sha256
            release_artifacts/${{ steps.meta.outputs.compliance_filename }}
            release_artifacts/${{ steps.meta.outputs.compliance_filename }}.sha256
            release_artifacts/release-manifest.json
            release_artifacts/release-payload-index.json
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: build-and-verify
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Check out the exact verified release tooling
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          path: tooling
          ref: ${{ needs.build-and-verify.outputs.release_tooling_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Check out tagged release notes
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          path: application
          ref: refs/tags/${{ needs.build-and-verify.outputs.source_tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up audited Python 3.11.9
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.9"

      - name: Install the only non-stdlib verifier dependency
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check --only-binary=:all: pefile==2024.8.26

      - name: Download verified release payload
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ${{ needs.build-and-verify.outputs.artifact_name }}
          path: release_artifacts

      - name: Revalidate transferred bytes and provenance
        shell: pwsh
        run: |
          python -B tooling/tools/release/validate_release_payload.py verify release_artifacts --expected-source-tag "${{ needs.build-and-verify.outputs.source_tag }}" --expected-source-commit "${{ needs.build-and-verify.outputs.source_commit }}" --expected-tooling-commit "${{ needs.build-and-verify.outputs.release_tooling_commit }}"
          if ($LASTEXITCODE -ne 0) { throw 'Downloaded release payload validation failed.' }
          python -B tooling/tools/release/verify_portable_release.py "release_artifacts/${{ needs.build-and-verify.outputs.portable_filename }}"
          if ($LASTEXITCODE -ne 0) { throw 'Downloaded portable/compliance verification failed.' }

      - name: Refuse an existing or conflicting public release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ needs.build-and-verify.outputs.source_tag }}" *> $null
          if ($LASTEXITCODE -eq 0) { throw 'A public release already exists for this immutable tag.' }

      - name: Create public GitHub Release for the existing tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = '${{ needs.build-and-verify.outputs.source_tag }}'
          $tagRef = "refs/tags/$tag"
          $expectedTagObject = '${{ needs.build-and-verify.outputs.source_tag_object }}'
          $expectedCommit = '${{ needs.build-and-verify.outputs.source_commit }}'
          if ((git -C application cat-file -t $tagRef).Trim() -ne 'tag') { throw 'Publish checkout tag is not annotated.' }
          if ((git -C application rev-parse $tagRef).Trim() -ne $expectedTagObject) { throw 'Publish checkout tag object changed.' }
          if ((git -C application rev-parse "$tagRef^{commit}").Trim() -ne $expectedCommit) { throw 'Publish checkout tag commit changed.' }
          if ((git -C application rev-parse HEAD).Trim() -ne $expectedCommit) { throw 'Publish checkout HEAD is not the verified application commit.' }
          $remoteRows = @(git -C tooling ls-remote --tags origin $tagRef "$tagRef^{}")
          if ($LASTEXITCODE -ne 0) { throw 'Remote release tag could not be revalidated.' }
          $remote = @{}
          foreach ($row in $remoteRows) {
            $hash, $ref = $row -split "`t", 2
            if ($hash -and $ref) { $remote[$ref] = $hash }
          }
          if ($remote[$tagRef] -ne $expectedTagObject) { throw 'Remote release tag object changed.' }
          if ($remote["$tagRef^{}"] -ne $expectedCommit) { throw 'Remote release tag commit changed.' }
          gh release create $tag `
            "release_artifacts/${{ needs.build-and-verify.outputs.portable_filename }}" `
            "release_artifacts/${{ needs.build-and-verify.outputs.portable_filename }}.sha256" `
            release_artifacts/release-manifest.json `
            "release_artifacts/${{ needs.build-and-verify.outputs.compliance_filename }}" `
            "release_artifacts/${{ needs.build-and-verify.outputs.compliance_filename }}.sha256" `
            release_artifacts/release-payload-index.json `
            --title "Music Vault $tag" `
            --notes-file "application/docs/releases/$tag.md" `
            --verify-tag
