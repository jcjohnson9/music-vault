name: Music Vault portable release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: music-vault-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-verify:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Check out exact tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up audited Python 3.11.9
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11.9"
          cache: pip
          cache-dependency-path: requirements-release.txt

      - name: Require exact centralized release tag
        shell: pwsh
        run: |
          $expected = python -B -c "from music_vault.version import APP_VERSION; print('v' + APP_VERSION)"
          if ($env:GITHUB_REF_NAME -ne $expected.Trim()) {
            throw "Tag does not match centralized application version."
          }

      - name: Install exact release environment
        shell: pwsh
        run: python -m pip install --disable-pip-version-check -r requirements-release.txt

      - name: Verify source and imports
        shell: pwsh
        run: python -B tools/verify_music_vault.py

      - name: Run full regression suite once
        shell: pwsh
        run: python -B -m pytest -q

      - name: Scan publication candidate
        shell: pwsh
        run: python -B tools/security/pre_public_commit_check.py

      - name: Compile active Python
        shell: pwsh
        run: python -B -m compileall -q music_vault tests tools

      - name: Build official one-folder EXE
        shell: pwsh
        run: python -m PyInstaller --noconfirm --clean MusicVault.spec

      - name: Fetch exact corresponding source
        shell: pwsh
        run: python -B tools/release/fetch_compliance_sources.py

      - name: Build portable and source-compliance artifacts
        shell: pwsh
        run: >-
          python -B tools/release/build_portable_release.py
          --output-dir release_artifacts
          --source-commit $env:GITHUB_SHA
          --require-clean-source

      - name: Verify both release artifacts
        shell: pwsh
        run: >-
          python -B tools/release/verify_portable_release.py
          release_artifacts/MusicVault-v1.0.0-Windows-x64-Portable.zip

      - name: Retain verified release payload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: music-vault-v1.0.0-verified-release
          path: |
            release_artifacts/MusicVault-v1.0.0-Windows-x64-Portable.zip
            release_artifacts/MusicVault-v1.0.0-Windows-x64-Portable.zip.sha256
            release_artifacts/MusicVault-v1.0.0-Source-Compliance.zip
            release_artifacts/MusicVault-v1.0.0-Source-Compliance.zip.sha256
            release_artifacts/release-manifest.json
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: build-and-verify
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Check out release notes only
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Download verified release payload
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: music-vault-v1.0.0-verified-release
          path: release_artifacts

      - name: Create public GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create $env:GITHUB_REF_NAME
          release_artifacts/MusicVault-v1.0.0-Windows-x64-Portable.zip
          release_artifacts/MusicVault-v1.0.0-Windows-x64-Portable.zip.sha256
          release_artifacts/release-manifest.json
          release_artifacts/MusicVault-v1.0.0-Source-Compliance.zip
          release_artifacts/MusicVault-v1.0.0-Source-Compliance.zip.sha256
          --title "Music Vault v1.0.0"
          --notes-file docs/releases/v1.0.0.md
          --verify-tag
